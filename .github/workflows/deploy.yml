name: Deploy React site

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: ${{ !contains(github.event.head_commit.message, '[skip deploy]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Restore Vite entry
        run: cp index.source.html index.html

      - name: Build
        run: npm run build

      - name: Publish build to main root
        run: |
          rm -rf assets
          cp -R dist/* .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets reinado-colonia-santa-isabel.jpg
          if git diff --cached --quiet; then
            echo "No build changes to publish"
          else
            git commit -m "Publica build do React [skip deploy]"
            git push
          fi
